<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="46" fill="#eef4ec" stroke="#16211a" stroke-width="4" />
  <circle cx="50" cy="50" r="40" fill="none" stroke="#cbd8cf" stroke-width="1.5" stroke-dasharray="3,3" />
  <!-- Mars Ground -->
  <path d="M 15 78 Q 50 68, 85 78 L 85 85 L 15 85 Z" fill="#b45309" stroke="#16211a" stroke-width="3" />
  <!-- Helicopter body -->
  <rect x="44" y="46" width="12" height="10" rx="2" fill="#1f6f4a" stroke="#16211a" stroke-width="2.5" />
  <!-- Mast -->
  <line x1="50" y1="30" x2="50" y2="46" stroke="#16211a" stroke-width="3" />
  <!-- Rotors -->
  <line x1="25" y1="30" x2="75" y2="30" stroke="#16211a" stroke-width="3.5" stroke-linecap="round" />
  <line x1="30" y1="36" x2="70" y2="36" stroke="#16211a" stroke-width="2.5" stroke-linecap="round" />
  <!-- Landing legs -->
  <path d="M 45 56 L 36 71 M 55 56 L 64 71" stroke="#16211a" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 33 71 L 67 71" stroke="#16211a" stroke-width="2" stroke-linecap="round" />
  <!-- Tiny solar panel on top of mast -->
  <rect x="42" y="40" width="16" height="3" fill="#16211a" />
</svg>
